[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "GPL-3.0-or-later",
  "MIT",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

when:
  event:
    - push
    - pull_request

steps:
  verify:
    image: docker.io/library/rust:1.96.1-bookworm
    commands:
      - apt-get update
      - >-
        apt-get install -y --no-install-recommends
        bash
        ca-certificates
        git
        make
        pkg-config
      - rm -rf /var/lib/apt/lists/*
      - rustup component add rustfmt clippy
      - >-
        cargo install --locked
        cargo-audit
        cargo-deny
        cargo-machete
        cargo-nextest
      - cargo install --locked cargo-insta
      - ./scripts/verify
